services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: driftguard-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: driftguard-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: driftguard-redis
          type: redis
          property: connectionString
      - key: CORS_ORIGINS
        value: https://driftguard.onrender.com
      - key: GROQ_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: ALPHAVANTAGE_API_KEY
        sync: false
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false

  # ── Celery worker ────────────────────────────────────────────────────────────
  - type: worker
    name: driftguard-celery-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: celery -A app.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: driftguard-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: driftguard-redis
          type: redis
          property: connectionString
      - key: GROQ_API_KEY
        sync: false

  # ── Celery beat ──────────────────────────────────────────────────────────────
  - type: worker
    name: driftguard-celery-beat
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: celery -A app.celery_app beat --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: driftguard-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: driftguard-redis
          type: redis
          property: connectionString

  # ── Frontend ─────────────────────────────────────────────────────────────────
  - type: web
    name: driftguard-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./frontend/dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://driftguard-api.onrender.com
      - key: VITE_WS_URL
        value: wss://driftguard-api.onrender.com

databases:
  - name: driftguard-db
    plan: free
    databaseName: portfolio_db

  - name: driftguard-redis
    plan: free
